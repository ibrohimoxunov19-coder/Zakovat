  ['auth','home','sel','game','res','adm'].forEach(function(s){

  if(nm==='auth') h.classList.add('hid'); else h.classList.remove('hid');

function showMsg(txt,type){
  var el=document.getElementById('amsg');
  el.className=type==='ok'?'ok':'err';
  el.textContent=txt;
}
function setBtnLoad(loading){
  var b=document.getElementById('abtn');
  b.disabled=loading;
  if(loading) b.textContent='Yuklanmoqda...';
  else b.textContent=AMODE==='l'?'Kirish':"Ro'yxatdan o'tish";
}

function setU(u){
  CU=u;
  document.getElementById('uname').textContent=u.nm||u.em.split('@')[0];
  var ab=document.getElementById('admbtn');
  if(u.ad) ab.classList.remove('hid'); else ab.classList.add('hid');
  go('home');
}

function doA(){
  var em=document.getElementById('em').value.trim();
  var pw=document.getElementById('pw').value;
  var fn=document.getElementById('fn').value.trim();
  document.getElementById('amsg').innerHTML='';

  if(!em||!pw){showMsg('Email va parol kiriting!','err');return;}

  if(AMODE==='r'){
    if(!fn){showMsg('Ismingizni kiriting!','err');return;}
    if(pw.length<6){showMsg("Parol kamida 6 belgi bo'lsin!",'err');return;}
  }

  setBtnLoad(true);

  if(FB){
    // Firebase auth
    if(AMODE==='l'){
      fbAuth.signInWithEmailAndPassword(em,pw)
        .then(function(uc){
          // Firestore dan admin statusini tekshir
          db.collection('users').doc(uc.user.uid).get()
            .then(function(doc){
              var isAd=doc.exists?doc.data().isAdmin||false:false;
              var isBl=doc.exists?doc.data().blocked||false:false;
              var nm=doc.exists?doc.data().name||em.split('@')[0]:em.split('@')[0];
              if(isBl){
                fbAuth.signOut();
                showMsg('Hisobingiz bloklangan!','err');
                setBtnLoad(false);
                return;
              }
              // localStorage ga ham saqlash
              var us=gUs();
              us[em]={nm:nm,ad:isAd,blocked:isBl};
              sUs(us);
              setU({em:em,nm:nm,ad:isAd});
            })
            .catch(function(){
              // Firestore ishlamasa localStorage dan
              var us=gUs();
              var lsUser=us[em];
              var isAd=lsUser?lsUser.ad:false;
              var nm=lsUser?lsUser.nm:em.split('@')[0];
              setU({em:em,nm:nm,ad:isAd});
            });
        })
        .catch(function(e){
          var t=e.code==='auth/user-not-found'||e.code==='auth/invalid-credential'
            ?"Foydalanuvchi topilmadi!"
            :e.code==='auth/wrong-password'
            ?"Parol noto'g'ri!"
            :e.code==='auth/invalid-email'
            ?"Email noto'g'ri!"
            :"Xatolik: "+e.message;
          showMsg(t,'err');
          setBtnLoad(false);
        });
    } else {
      fbAuth.createUserWithEmailAndPassword(em,pw)
        .then(function(uc){
          return uc.user.updateProfile({displayName:fn}).then(function(){
            var us=gUs();
            us[em]={nm:fn,pw:pw,ad:false,blocked:false};
            sUs(us);
            return db.collection('users').doc(uc.user.uid).set({
              email:em,name:fn,isAdmin:false,blocked:false,
              createdAt:new Date().toISOString()
            });
          }).then(function(){
            setU({em:em,nm:fn,ad:false});
          });
        })
        .catch(function(e){
          var t=e.code==='auth/email-already-in-use'
            ?"Bu email allaqachon ro'yxatdan o'tgan!"
            :e.code==='auth/invalid-email'
            ?"Email noto'g'ri!"
            :"Xatolik: "+e.message;
          showMsg(t,'err');
          setBtnLoad(false);
        });
    }
  } else {
    // localStorage fallback
    var us=gUs();
    if(AMODE==='l'){
      if(!us[em]){showMsg("Bu email ro'yxatdan o'tmagan!",'err');setBtnLoad(false);return;}
      if(us[em].pw!==pw){showMsg("Parol noto'g'ri!",'err');setBtnLoad(false);return;}
      if(us[em].blocked){showMsg('Hisobingiz bloklangan!','err');setBtnLoad(false);return;}
      setU({em:em,nm:us[em].nm,ad:us[em].ad});
    } else {
      if(us[em]){showMsg("Bu email allaqachon ro'yxatdan o'tgan!",'err');setBtnLoad(false);return;}
      us[em]={nm:fn,pw:pw,ad:false,blocked:false};
      sUs(us);
      setU({em:em,nm:fn,ad:false});
    }
  }
}

function doOut(){
  if(FB&&fbAuth) fbAuth.signOut().catch(function(){});
  CU=null;
  document.getElementById('em').value='';
  document.getElementById('pw').value='';
  document.getElementById('fn').value='';
  toLogin();
  go('auth');
}

// admin login via Firebase Console - no signup on site
// To make someone admin: Firebase Console > Firestore > users > set isAdmin: true
// Then update localStorage: gUs()[email].ad = true

// Load admin status from Firestore when logging in
function checkAdminStatus(uid, em, nm, cb){
  if(!FB||!db){cb(false);return;}
  db.collection('users').doc(uid).get()
    .then(function(doc){
      var isAd=doc.exists?doc.data().isAdmin||false:false;
      // sync to localStorage
      var us=gUs();
      if(us[em]) us[em].ad=isAd;
      sUs(us);
      cb(isAd);
    })
    .catch(function(){cb(false);});
}

// game helpers
function gQ(s,t){return QS.filter(function(q){return q.s===s&&(!t||q.t===t);});}
function shuf(a){return a.slice().sort(function(){return Math.random()-.5;});}

// load questions from Firestore
function loadFbQs(cb){
  if(!FB||!db){cb();return;}
  db.collection('questions').get()
    .then(function(snap){
      snap.docs.forEach(function(d){
        var data=d.data();
        var obj={id:d.id,s:data.section,t:data.topic,q:data.question,a:data.answer,e:data.explanation||'',p:data.points||1};
        if(!QS.find(function(x){return x.id===obj.id;})) QS.push(obj);
      });
      cb();
    })
    .catch(function(){cb();});
}

// selector
function goSel(sec){
  GC={s:sec};
  var el=document.getElementById('sel-b');
  if(sec==='svoyak'){
    el.innerHTML='<div class="ptit">Svoyak</div><div class="psub">Mavzuni tanlang</div><div class="tgrid">'+
      SVT.map(function(t){return '<button class="tbtn" onclick="pTop(this,\''+t+'\')"><div class="tn">'+t+'</div><div class="tp">10-50 ball</div></button>';}).join('')+
      '</div><button class="btn-start" id="go-btn" disabled onclick="startG()">Boshlash</button>';
  } else if(sec==='fakt'){
    el.innerHTML='<div class="ptit">Faktlar</div><div class="psub">Mavzuni tanlang</div><div class="tgrid">'+
      FT.map(function(t){return '<button class="tbtn" onclick="pTop(this,\''+t+'\')"><div class="tn">'+t+'</div></button>';}).join('')+
      '</div><button class="btn-start" id="go-btn" disabled onclick="startG()">Boshlash</button>';
  } else {
    el.innerHTML='<div class="ptit">'+(sec==='oson'?'Oson':sec==='ortacha'?"O'rtacha":'Qiyin')+'</div>'+
      '<div class="psub">Nechta savol ishlaysiz?</div><div class="cgrid">'+
      [5,10,15,20].map(function(c){return '<button class="cb" onclick="pCnt(this,'+c+')">'+c+' ta</button>';}).join('')+
      '</div><button class="btn-start" id="go-btn" disabled onclick="startG()">Boshlash</button>';
  }
  go('sel');
}
function pCnt(el,n){
  document.querySelectorAll('.cb').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on'); GC.cnt=n;
  document.getElementById('go-btn').disabled=false;
}
function pTop(el,t){
  document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on'); GC.top=t;
  document.getElementById('go-btn').disabled=false;
}

// game
function startG(){
  clearInterval(TIV);
  var sec=GC.s,top=GC.top,cnt=GC.cnt||10;
  if(sec==='fakt'){
    var fqs=gQ('fakt',top);
    if(!fqs.length) fqs=gQ('fakt');
    GQS=shuf(fqs);FI=0;go('game');rFact();return;
  }
  GQS=shuf(gQ(sec,null)).slice(0,cnt);
  if(sec==='svoyak'){
    var pts=[10,20,30,40,50];
    GQS=GQS.map(function(q,i){return Object.assign({},q,{p:pts[i%pts.length]});});
  }
  GI=0;GSC=0;GOK=0;GFL=0;go('game');rQ();
}

function rFact(){
  var el=document.getElementById('game-b');
  if(!GQS.length){el.innerHTML='<div class="emp">Bu mavzuda faktlar yo\'q</div><button class="btn-start" style="margin-top:1rem" onclick="goH()">Orqaga</button>';return;}
  var q=GQS[FI];
  el.innerHTML='<button class="bb" onclick="goH()">Chiqish</button>'+
    '<div class="qmeta"><span class="qc">Fakt '+(FI+1)+'/'+GQS.length+'</span><span style="font-size:.75rem;color:#aaa">'+(q.t||'')+'</span></div>'+
    '<div class="fcard"><div class="fnum">Fakt #'+(FI+1)+'</div><div class="ftxt">'+q.q+'</div>'+(q.e?'<div class="fexp">'+q.e+'</div>':'')+'</div>'+
    '<div class="fbtns">'+(FI>0?'<button class="bfact" onclick="fNav(-1)">Oldingi</button>':'')+
    (FI<GQS.length-1?'<button class="bfact" onclick="fNav(1)">Keyingi</button>':'<button class="btn-start" onclick="goH()">Tugash</button>')+'</div>';
}
function fNav(d){FI+=d;rFact();}

var TSEC=60,TRUN=false;
function rQ(){
  clearInterval(TIV);TRUN=false;
  var el=document.getElementById('game-b');
  if(GI>=GQS.length){showRes();return;}
  var q=GQS[GI],sv=GC.s==='svoyak',prg=Math.round((GI+1)/GQS.length*100);
  el.innerHTML=
    '<div class="qmeta"><span class="qc">Savol '+(GI+1)+'/'+GQS.length+'</span>'+
    '<span class="qsc">'+(sv?'Ball: '+GSC:'Togri: '+GOK+' | Notogri: '+GFL)+'</span></div>'+
    '<div class="pbg"><div class="pb" style="width:'+prg+'%"></div></div>'+
    '<div class="qcard" id="qc">'+
    '<div class="qcat">'+(q.t||'')+( sv?' | <span style="color:#f5c518">'+q.p+' ball</span>':'' )+'</div>'+
    '<div class="qtxt">'+q.q+'</div>'+
    '<button class="tbtnx" id="tbtn" onclick="stTmr()">Vaqtni boshlash (60 son)</button>'+
    '<div class="aa"><input class="ai" id="ainp" placeholder="Javobingizni yozing..." onkeydown="if(event.key===\'Enter\')chkA()">'+
    '<button class="bch" onclick="chkA()">Tekshirish</button></div></div>';
  setTimeout(function(){var i=document.getElementById('ainp');if(i)i.focus();},50);
}

function stTmr(){
  if(TRUN)return; TRUN=true; TSEC=60;
  var b=document.getElementById('tbtn');
  if(!b)return;
  b.disabled=true;b.classList.add('run');
  b.innerHTML='<span id="ts" class="tnum">60</span> soniya qoldi';
  TIV=setInterval(function(){
    TSEC--;
    var ts=document.getElementById('ts');
    if(ts) ts.textContent=TSEC;
    if(TSEC<=30){var b=document.getElementById('tbtn');if(b){b.style.background='#2a1a00';b.style.borderColor='#f5a000';}}
    if(TSEC<=0){
      clearInterval(TIV);
      var b=document.getElementById('tbtn');
      if(b){b.innerHTML='Vaqt tugadi!';b.style.background='#2a0000';b.style.borderColor='#aa0000';b.style.color='#ff8080';}
    }
  },1000);
}

function chkA(){
  clearInterval(TIV);TRUN=false;
  var inp=document.getElementById('ainp');
  if(!inp||!inp.value.trim())return;
  var ans=inp.value.trim(),q=GQS[GI],sv=GC.s==='svoyak';
  var ok=ans.toLowerCase()===q.a.toLowerCase();
  if(ok){GOK++;GSC+=q.p||1;}else{GFL++;if(sv)GSC-=(q.p||10);}
  var card=document.getElementById('qc');
  var tb=document.getElementById('tbtn');if(tb)tb.remove();
  var aa=card.querySelector('.aa');if(aa)aa.remove();
  var rd=document.createElement('div');
  rd.className='rb '+(ok?'rok':'rfail');
  rd.innerHTML='<div class="rt '+(ok?'ok':'fail')+'">'+(ok?'Togri!':'Notogri')+'</div>'+
    (!ok?'<div class="ra">Togri javob: <strong>'+q.a+'</strong></div>':'')+
    (!ok&&q.e?'<div class="re">'+q.e+'</div>':'')+
    (sv?'<div style="margin-top:.35rem;font-weight:700;font-size:.8rem;color:'+(ok?'#80ff80':'#ff8080')+'">'+(ok?'+':'-')+q.p+' ball</div>':'');
  card.appendChild(rd);
  var nb=document.createElement('button');
  nb.className='bn';
  nb.textContent=GI>=GQS.length-1?'Natijalarni korish':'Keyingi savol';
  nb.onclick=function(){GI++;rQ();};
  card.appendChild(nb);
}

function showRes(){
  var tot=GQS.length,pct=tot?Math.round(GOK/tot*100):0,sv=GC.s==='svoyak';
  var md=pct>=80?'Ajoyib!':pct>=50?'Yaxshi!':'Mashq qiling!';
  document.getElementById('res-b').innerHTML=
    '<div class="rcir"><div class="rsc">'+(sv?GSC:pct+'%')+'</div><div class="rlb">'+(sv?'ball':'natija')+'</div></div>'+
    '<div class="rtit">'+(pct>=80?'🥇':pct>=50?'🥈':'🥉')+' '+md+'</div>'+
    '<div class="rsub">'+(pct>=80?'Siz juda bilimli!':pct>=50?'Davom eting!':"Ko'proq mashq qiling!")+'</div>'+
    '<div class="sgr">'+
    '<div class="sb"><div class="sv ok">'+GOK+'</div><div class="sl">Togri javob</div></div>'+
    '<div class="sb"><div class="sv fail">'+GFL+'</div><div class="sl">Notogri javob</div></div>'+
    '<div class="sb"><div class="sv">'+tot+'</div><div class="sl">Jami savol</div></div>'+
    '<div class="sb"><div class="sv">'+pct+'%</div><div class="sl">Foiz</div></div>'+
    '</div><button class="btn-start" onclick="goH()">Bosh sahifaga</button>';
  go('res');
}

// admin
function aT(n){
  ['add','list','users'].forEach(function(x){document.getElementById('at-'+x).classList.toggle('on',x===n);});
  if(n==='add') rAdd(); else if(n==='list') rList('oson'); else rUsers();
}

function rAdd(){
  document.getElementById('adm-b').innerHTML=
    '<div class="card"><div class="ctit">Yangi savol qoshish</div><div id="admsg"></div>'+
    '<div class="frow">'+
    '<div class="fg"><label>Bolim</label><select class="fs" id="asec"><option value="oson">Oson</option><option value="ortacha">Ortacha</option><option value="qiyin">Qiyin</option><option value="svoyak">Svoyak</option><option value="fakt">Fakt</option></select></div>'+
    '<div class="fg"><label>Mavzu</label><input class="fi" id="atop" placeholder="Sport, Tarix..."></div></div>'+
    '<div class="fg"><label>Ball</label><input class="fi" id="apts" type="number" value="1" min="1" style="max-width:90px"></div>'+
    '<div class="fg"><label>Savol matni</label><textarea class="fta" id="aq" placeholder="Savolni yozing..."></textarea></div>'+
    '<div class="fg"><label>Togri javob</label><input class="fi" id="aans" placeholder="Javob"></div>'+
    '<div class="fg"><label>Izoh (ixtiyoriy)</label><textarea class="fta" id="aexp" placeholder="Izoh..."></textarea></div>'+
    '<button class="badd" onclick="addQ()">+ Savol qoshish</button></div>';
}

function addQ(){
  var sec=document.getElementById('asec').value;
  var top=document.getElementById('atop').value.trim();
  var q=document.getElementById('aq').value.trim();
  var ans=document.getElementById('aans').value.trim();
  var exp=document.getElementById('aexp').value.trim();
  var pts=parseInt(document.getElementById('apts').value)||1;
  var msg=document.getElementById('admsg');
  if(!q||!ans){msg.className='err';msg.textContent='Savol va javob majburiy!';return;}
  var obj={id:'u'+(NID++),s:sec,t:top||'Umumiy',q:q,a:ans,e:exp,p:pts};
  QS.push(obj);sQls();
  if(FB&&db){
    db.collection('questions').add({
      section:sec,topic:top||'Umumiy',question:q,answer:ans,
      explanation:exp,points:pts,createdAt:new Date().toISOString()
    }).catch(function(){});
  }
  msg.className='ok';msg.textContent='Savol qoshildi!';
  document.getElementById('aq').value='';
  document.getElementById('aans').value='';
  document.getElementById('aexp').value='';
  setTimeout(function(){msg.textContent='';},3000);
}

function rList(sec){
  LSEC=sec||LSEC;
  var qs=gQ(LSEC,null);
  var secs=['oson','ortacha','qiyin','svoyak','fakt'];
  var bc={oson:'bo',ortacha:'bm',qiyin:'bq',svoyak:'bsv',fakt:'bf'};
  var tabs=secs.map(function(s){return '<button class="at'+(LSEC===s?' on':'')+'" onclick="rList(\''+s+'\')">'+s+'</button>';}).join('');
  var items=qs.length?'<div class="qlist">'+qs.map(function(q){
    return '<div class="qi" id="qi'+q.id+'"><div class="qib"><div class="qiq">'+q.q+'</div>'+
      '<div class="qim"><span class="bdg '+(bc[q.s]||'bo')+'">'+q.s+'</span>'+(q.t?'<span class="bdg '+(bc[q.s]||'bo')+'">'+q.t+'</span>':'')+
      ' Javob: <strong>'+q.a+'</strong> - '+q.p+' ball</div></div>'+
      '<button class="bdel" onclick="delQ(\''+q.id+'\')">Ochirish</button></div>';
  }).join('')+'</div>':'<div class="emp">Bu bolimda savollar yoq</div>';
  document.getElementById('adm-b').innerHTML='<div class="card"><div class="ctit">Savollar royxati</div><div class="ftabs">'+tabs+'</div>'+items+'</div>';
}

function delQ(id){
  if(FB&&db) db.collection('questions').doc(id).delete().catch(function(){});
  var i=QS.findIndex(function(q){return q.id===id;});
  if(i>-1) QS.splice(i,1);
  sQls();
  var el=document.getElementById('qi'+id);if(el)el.remove();
}

function rUsers(){
  var us=gUs();
  var keys=Object.keys(us).filter(function(k){return !us[k].ad;});
  var el=document.getElementById('adm-b');
  var items=keys.length?keys.map(function(em){
    var u=us[em],isBl=u.blocked||false;
    var uid='ui'+em.replace(/[^a-z0-9]/gi,'_');
    return '<div class="uitem" id="'+uid+'">'+
      '<div><div class="unm">'+(u.nm||'Nomalum')+'</div>'+
      '<div class="uem">'+em+'</div>'+
      (isBl?'<div class="ubld">Bloklangan</div>':'')+'</div>'+
      '<button class="bblk '+(isBl?'unb':'blk')+'" onclick="togBl(\''+em+'\')">'+(isBl?'Blokdan chiqarish':'Bloklash')+'</button></div>';
  }).join(''):'<div class="emp">Hali foydalanuvchilar yoq</div>';
  el.innerHTML='<div class="card"><div class="ctit">Foydalanuvchilar ('+keys.length+' ta)</div>'+items+'</div>';
}

function togBl(em){
  var us=gUs();if(!us[em])return;
  us[em].blocked=!us[em].blocked;
  sUs(us);rUsers();
}

// init
loadLsQs();
if(FB){
  loadFbQs(function(){});
}
go('auth');
rAdd();
</script>
